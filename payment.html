<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Payment Due — Go For Diagnostics</title>
<style>
  :root{
    --teal:#1ba8c9; --teal-dark:#0d8aaa; --teal-light:#e8f8fc;
    --amber:#f0a500; --red:#e0503c; --red-light:#fdeae7;
    --ink:#1a2a3a; --gray:#6b7280; --gray-light:#f4f8fa; --line:#e2e8ee;
    --white:#fff; --radius:10px;
    --shadow:0 2px 10px rgba(20,50,70,.08);
  }
  *{box-sizing:border-box;}
  body{margin:0;font-family:"Segoe UI",Roboto,Arial,sans-serif;background:var(--gray-light);color:var(--ink);
    display:flex;align-items:center;justify-content:center;min-height:100vh;padding:16px;}
  .card{background:#fff;border-radius:var(--radius);box-shadow:var(--shadow);padding:26px 22px;max-width:380px;width:100%;text-align:center;}
  header{background:linear-gradient(135deg,var(--teal),var(--teal-dark));color:#fff;border-radius:var(--radius) var(--radius) 0 0;
    margin:-26px -22px 18px;padding:16px 20px;font-weight:700;font-size:1.05rem;}
  .patient{font-size:.92rem;color:var(--gray);margin-bottom:2px;}
  .patient b{color:var(--ink);}
  .qrbox{text-align:center;padding:14px;border:1.5px dashed var(--amber);border-radius:10px;background:#fffaf0;margin:16px 0;}
  .qrbox img{max-width:220px;width:100%;border-radius:8px;box-shadow:var(--shadow);}
  .due-label{font-size:.78rem;color:var(--gray);text-transform:uppercase;letter-spacing:.4px;margin-top:8px;}
  .due-amt{font-size:1.6rem;color:var(--red);font-weight:800;margin:4px 0 10px;}
  .note{font-size:.8rem;color:var(--gray);line-height:1.4;}
  .missing{padding:30px 10px;color:var(--gray);}
</style>
</head>
<body>
  <div class="card" id="card">
    <header>Go For Diagnostics</header>
    <div id="content"></div>
  </div>

  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getFirestore, collection, addDoc, getDocs, query, orderBy } 
    from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyAV8P31Qtn4oN0iglGGreZ6ms4Rl5KwMsY",
    authDomain: "go4diagnostic.firebaseapp.com",
    projectId: "go4diagnostic",
    storageBucket: "go4diagnostic.firebasestorage.app",
    messagingSenderId: "927304157464",
    appId: "1:927304157464:web:9283f85a97c354b856766d"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  // Save a new patient
  window.addPatient = async function(patientData) {
    try {
      await addDoc(collection(db, "patients"), {
        ...patientData,
        createdAt: new Date().toISOString()
      });
      return true;
    } catch (err) {
      console.error("Error saving patient:", err);
      return false;
    }
  };

  // Load all patients (newest first)
  window.loadPatients = async function() {
    try {
      const q = query(collection(db, "patients"), orderBy("createdAt", "desc"));
      const snapshot = await getDocs(q);
      return snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
    } catch (err) {
      console.error("Error loading patients:", err);
      return [];
    }
  };
</script>
